<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbearia Elite - Login</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:400px;
    background:#1c1c1c;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(212,175,55,.3);
}

.logo-login{
    text-align:center;
    color:#d4af37;
    font-size:32px;
    font-weight:bold;
    margin-bottom:25px;
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
}

</style>

</head>
<body>

<div class="login-box">

<div class="logo-login">
💈 BARBEARIA ELITE
</div>

<h2>Entrar no Sistema</h2>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Digite seu e-mail"
required>

<input
type="password"
id="senha"
placeholder="Digite sua senha"
required>

<button type="submit">
Entrar
</button>

</form>

</div>

<script>

document
.getElementById("loginForm")
.addEventListener("submit",function(e){

e.preventDefault();

window.location.href =
"dashboard.html";

});

</script>

</body>
</html>
