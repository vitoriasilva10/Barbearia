<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financeiro - Barbearia Elite</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="sidebar">

<div class="logo">
💈 BARBEARIA ELITE
</div>

<div class="menu">
<a href="dashboard.html">🏠 Dashboard</a>
<a href="clientes.html">👥 Clientes</a>
<a href="agendamentos.html">📅 Agendamentos</a>
<a href="financeiro.html">💰 Financeiro</a>
<a href="relatorios.html">📊 Relatórios</a>
<a href="login.html">🚪 Sair</a>
</div>

</div>

<div class="content">

<h1>Financeiro</h1>

<div class="card">

<input
type="text"
id="descricao"
placeholder="Descrição do serviço">

<input
type="number"
id="valor"
placeholder="Valor (R$)">

<button onclick="adicionarReceita()">
Adicionar Receita
</button>

</div>

<div class="card">

<h2>Faturamento Total</h2>

<div
class="numero"
id="totalReceitas">
R$ 0,00
</div>

</div>

<table>

<thead>
<tr>
<th>Descrição</th>
<th>Valor</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="listaReceitas">

</tbody>

</table>

</div>

<script>

let receitas =
JSON.parse(localStorage.getItem("receitas")) || [];

function salvarReceitas(){

localStorage.setItem(
"receitas",
JSON.stringify(receitas)
);

}

function adicionarReceita(){

let descricao =
document.getElementById("descricao").value;

let valor =
parseFloat(
document.getElementById("valor").value
);

if(
descricao === "" ||
isNaN(valor)
){
alert("Preencha todos os campos");
return;
}

receitas.push({
descricao,
valor
});

salvarReceitas();

document.getElementById("descricao").value="";
document.getElementById("valor").value="";

listarReceitas();

}

function listarReceitas(){

let tabela =
document.getElementById("listaReceitas");

tabela.innerHTML = "";

let total = 0;

receitas.forEach((item,index)=>{

total += Number(item.valor);

tabela.innerHTML += `
<tr>

<td>${item.descricao}</td>

<td>
R$ ${Number(item.valor).toFixed(2)}
</td>

<td>

<button
class="excluir"
onclick="excluirReceita(${index})">
Excluir
</button>

</td>

</tr>
`;

});

document.getElementById("totalReceitas")
.innerText =
"R$ " + total.toFixed(2);

}

function excluirReceita(index){

if(confirm("Deseja excluir este lançamento?")){

receitas.splice(index,1);

salvarReceitas();

listarReceitas();

}

}

listarReceitas();

</script>

</body>
</html>
